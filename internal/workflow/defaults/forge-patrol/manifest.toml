name = "forge-patrol"
type = "workflow"
description = "Forge merge patrol loop — claim, merge, gate, push, repeat."

[variables]
world = { required = true }
target_branch = { default = "main" }
gate_command = { default = "make build && make test" }

[[steps]]
id = "unblock"
title = "Unblock resolved MRs"
instructions = "steps/01-unblock.md"

[[steps]]
id = "scan"
title = "Scan the merge queue"
instructions = "steps/02-scan.md"
needs = ["unblock"]

[[steps]]
id = "claim"
title = "Claim next MR"
instructions = "steps/03-claim.md"
needs = ["scan"]

[[steps]]
id = "sync"
title = "Sync to target branch"
instructions = "steps/04-sync.md"
needs = ["claim"]

[[steps]]
id = "merge"
title = "Squash-merge the outpost branch"
instructions = "steps/05-merge.md"
needs = ["sync"]

[[steps]]
id = "gates"
title = "Run quality gates"
instructions = "steps/06-gates.md"
needs = ["merge"]

[[steps]]
id = "push"
title = "Push to target branch"
instructions = "steps/07-push.md"
needs = ["gates"]

[[steps]]
id = "handle-result"
title = "Handle merge result"
instructions = "steps/08-handle-result.md"
needs = ["push"]

[[steps]]
id = "loop"
title = "Loop or health-check"
instructions = "steps/09-loop.md"
needs = ["handle-result"]

[[steps]]
id = "health-check"
title = "Context health check"
instructions = "steps/10-health-check.md"
needs = ["loop"]

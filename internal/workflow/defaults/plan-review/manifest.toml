name = "plan-review"
description = "Parallel plan analysis with five independent review dimensions and a go/no-go synthesis."
mode = "manifest"

[[steps]]
id = "completeness"
title = "Completeness Analysis"
description = """
Assess whether the plan covers all required elements: goals, deliverables, acceptance criteria, resource needs, and timeline.

Focus: Are there gaps in what the plan promises to deliver versus what it actually specifies?

**Look for:**
- Requirements from the original request with no corresponding plan step
- Implied work that isn't explicitly planned (migrations, tests, docs, rollout)
- Missing infrastructure or setup steps assumed to "just exist"
- No monitoring or alerting plan for production changes
- No rollback plan for risky or irreversible changes
- Missing error handling or graceful degradation steps
- Tests not mentioned as explicit deliverables
- Post-launch validation or smoke-test steps not planned
- Clean-up, deprecation, or feature-flag removal work not included
- Configuration or environment setup assumed but not planned
- Documentation updates not accounted for (CLI help, READMEs, ADRs)
- Missing coordination steps (notifications, hand-offs, reviews)

**Questions to answer:**
- Which stated requirement has no plan step covering it?
- What will be obviously missing when the last step is closed?
- What will the implementer ask "wasn't this supposed to be part of this?" about?
- If an outsider read only this plan, could they execute it without guessing?

**Output format:**
```
## Verdict
PASS / PASS WITH NOTES / FAIL — one sentence rationale

## Must Fix (blocks implementation)
- Issue: <description>
- Why it matters: <impact>
- Suggested fix: <what to add or change in the plan>

## Should Fix (important but not blocking)
- ...

## Observations (non-blocking notes)
- ...
```"""
kind = "analysis"

[[steps]]
id = "sequencing"
title = "Sequencing & Dependency Analysis"
description = """
Evaluate the ordering of steps and identify dependency relationships. Flag implicit dependencies, missing prerequisites, and parallelism opportunities.

Focus: Can the steps execute in the proposed order without blocking or hidden prerequisites?

**Look for:**
- Steps that depend on artifacts not yet built at that point in the sequence
- Schema migrations that must happen before code changes that use them
- API changes needing coordination between producer and consumer
- Steps that could be parallelized but are listed sequentially
- Steps listed as parallel that actually have a hidden dependency
- Missing blocking relationships between steps or deliverables
- Infrastructure that must exist before application code can run
- Feature flag or configuration requirements not sequenced before the feature itself
- Database seed data or initial configuration needed early but planned late
- Test steps that depend on deployment steps not yet complete
- External approvals or reviews that gate subsequent work
- Circular dependencies hiding in the step graph

**Questions to answer:**
- Can every step start immediately when its stated dependencies are done?
- Is there a circular or mutual dependency hiding somewhere?
- What would cause a "we can't proceed" moment mid-implementation?
- Which steps could run in parallel to speed up delivery?

**Output format:**
```
## Verdict
PASS / PASS WITH NOTES / FAIL — one sentence rationale

## Must Fix (blocks implementation)
- Issue: <description>
- Why it matters: <impact>
- Suggested fix: <what to reorder or add>

## Should Fix (important but not blocking)
- ...

## Observations (non-blocking notes)
- ...
```"""
kind = "analysis"

[[steps]]
id = "risk"
title = "Risk Assessment"
description = """
Identify technical, operational, and integration risks. Evaluate likelihood and impact. Flag single points of failure, untested assumptions, and rollback gaps.

Focus: What can go wrong and how severe would the impact be?

**Look for:**
- Steps with high uncertainty or novel technology nobody on the team has used
- External dependencies (third-party APIs, services) with reliability or availability risk
- Steps that will be hard to test or verify in a non-production environment
- Changes to shared infrastructure or libraries affecting other consumers
- Database migrations that are difficult or impossible to reverse
- Breaking changes to existing integrations, APIs, or CLI contracts
- Performance risks with no load testing or benchmarking step
- Security surface area expansion without a corresponding security review step
- Vague or hand-wavy descriptions ("we'll figure it out", "TBD")
- Single points of failure in the implementation sequence
- Steps with estimates that seem unrealistic given their described complexity
- Missing contingency plans for the highest-risk steps

**Questions to answer:**
- What is the highest-risk step, and does the plan de-risk it early?
- What assumption in this plan is most likely to be wrong?
- What is the recovery plan if step N fails mid-implementation?
- What external factor could block progress entirely?

**Output format:**
```
## Verdict
PASS / PASS WITH NOTES / FAIL — one sentence rationale

## Must Fix (blocks implementation)
- Issue: <description>
- Why it matters: <impact>
- Suggested fix: <what mitigation or de-risk step to add>

## Should Fix (important but not blocking)
- ...

## Observations (non-blocking notes)
- ...
```"""
kind = "analysis"

[[steps]]
id = "scope-creep"
title = "Scope-Creep Detection"
description = """
Compare stated objectives against proposed work. Identify gold-plating, feature additions beyond requirements, and unnecessary complexity.

Focus: Does any proposed work exceed what was actually requested or needed?

**Look for:**
- Steps that are not necessary for the stated goal or MVP
- Gold-plating: doing it "properly" when "good enough" would ship faster
- Refactors bundled in that are not required for the feature to work
- Future-proofing that adds complexity without delivering current benefit
- Steps solving problems not mentioned in the original request
- Premature abstraction or generalization beyond what's needed now
- "While we're in there" cleanup that is not blocking the feature
- Polishing steps for internal-only or low-traffic code paths
- Testing coverage disproportionate to the risk of the code being tested
- Documentation for things that do not need external-facing documentation
- Infrastructure upgrades bundled in that could be separate work items
- Steps that only make sense if a future feature is built (speculative work)

**Questions to answer:**
- What is the minimum set of steps for a working, shippable result?
- What in this plan is for future requirements, not current ones?
- Which steps could be filed as follow-up work items without blocking launch?
- What would you cut if the timeline were halved?

**Output format:**
```
## Verdict
PASS / PASS WITH NOTES / FAIL — one sentence rationale

## Must Fix (blocks implementation)
- Issue: <description>
- Why it matters: <impact>
- Suggested fix: <what to cut or defer>

## Should Fix (important but not blocking)
- ...

## Observations (non-blocking notes)
- ...
```"""
kind = "analysis"

[[steps]]
id = "testability"
title = "Testability Review"
description = """
Assess whether each deliverable can be verified. Check for measurable acceptance criteria, test strategies, and observable outcomes.

Focus: How will we know each step succeeded?

**Look for:**
- Steps with no associated test plan or verification strategy
- Features that are hard to test in isolation from the rest of the system
- End-to-end flows with no integration test coverage planned
- No definition of what "passing" looks like for each step
- Missing smoke tests or validation steps post-deployment
- Metrics or observability not planned (how will we know it works in production?)
- Manual verification steps that should be automated
- Tests that can only run in production and not in dev or staging
- No regression test plan for existing behavior that might be affected
- Acceptance criteria that are subjective or unmeasurable ("fast", "clean", "good UX")
- Missing edge-case coverage for error paths, empty states, and boundary conditions
- No plan for how to verify rollback works if needed

**Questions to answer:**
- After all steps are closed, how do we know the feature works end-to-end?
- What is the first signal that something went wrong in production?
- Which steps have acceptance criteria that are verifiable by automation?
- What requires manual testing, and is that testing planned?

**Output format:**
```
## Verdict
PASS / PASS WITH NOTES / FAIL — one sentence rationale

## Must Fix (blocks implementation)
- Issue: <description>
- Why it matters: <impact>
- Suggested fix: <what test or verification to add>

## Should Fix (important but not blocking)
- ...

## Observations (non-blocking notes)
- ...
```"""
kind = "analysis"

[[steps]]
id = "synthesis"
title = "Go/No-Go Recommendation"
description = """
Consolidate findings from all five analysis dimensions into a single go/no-go recommendation.

**Your task:**
1. Read all five leg outputs (completeness, sequencing, risk, scope-creep, testability)
2. Extract each leg's verdict (PASS / PASS WITH NOTES / FAIL) and key findings
3. Aggregate per-leg verdicts into a summary table
4. Deduplicate cross-leg findings — issues flagged by multiple legs are higher-confidence problems
5. Determine overall verdict: GO / GO WITH FIXES / NO-GO
   - GO: All legs PASS or PASS WITH NOTES, no must-fix items
   - GO WITH FIXES: No FAIL verdicts, but must-fix items exist that can be addressed without replanning
   - NO-GO: Any leg FAILs, or must-fix items require fundamental replanning
6. List all must-fix items with which legs flagged them

**Output format:**
```
## Overall Verdict
**GO / GO WITH FIXES / NO-GO** — one paragraph rationale

## Leg Verdicts
| Dimension | Verdict | Key Finding |
|-----------|---------|-------------|
| Completeness | PASS/PASS WITH NOTES/FAIL | <one-line summary> |
| Sequencing | PASS/PASS WITH NOTES/FAIL | <one-line summary> |
| Risk | PASS/PASS WITH NOTES/FAIL | <one-line summary> |
| Scope Discipline | PASS/PASS WITH NOTES/FAIL | <one-line summary> |
| Testability | PASS/PASS WITH NOTES/FAIL | <one-line summary> |

## Cross-Leg Findings (flagged by 2+ dimensions)
These are higher-confidence issues because multiple independent reviewers identified them.
- <finding>: flagged by <leg1>, <leg2>

## Must Fix Before Proceeding
(Blocking issues — plan needs revision before implementation starts)

### [Issue Title]
- **Found by**: <which legs>
- **Problem**: <what is wrong>
- **Required fix**: <what needs to change in the plan>

## Should Fix
(Important but not blocking — can be addressed during implementation)
- ...

## Observations
(Non-blocking notes worth considering)
- ...

## Next Steps
- [ ] Address must-fix items in plan (if any)
- [ ] Re-review if NO-GO verdict
- [ ] Proceed with implementation if GO or GO WITH FIXES (after fixes applied)
```"""
kind = "analysis"
needs = ["completeness", "sequencing", "risk", "scope-creep", "testability"]

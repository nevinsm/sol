name = "plan-review"
description = "Parallel plan analysis with five independent review dimensions and a go/no-go synthesis."
mode = "manifest"

[variables]
target = { description = "Writ ID of the plan to review", required = true }

[[steps]]
id = "completeness"
title = "Completeness Analysis"
instructions = "steps/completeness.md"
kind = "analysis"

[[steps]]
id = "sequencing"
title = "Sequencing & Dependency Analysis"
instructions = "steps/sequencing.md"
kind = "analysis"

[[steps]]
id = "risk"
title = "Risk Assessment"
instructions = "steps/risk.md"
kind = "analysis"

[[steps]]
id = "scope-creep"
title = "Scope-Creep Detection"
instructions = "steps/scope-creep.md"
kind = "analysis"

[[steps]]
id = "testability"
title = "Testability Review"
instructions = "steps/testability.md"
kind = "analysis"

[[steps]]
id = "synthesis"
title = "Go/No-Go Recommendation"
instructions = "steps/synthesis.md"
kind = "analysis"
needs = ["completeness", "sequencing", "risk", "scope-creep", "testability"]

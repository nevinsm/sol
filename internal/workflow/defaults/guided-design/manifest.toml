name = "guided-design"
description = "Parallel design exploration across six dimensions with synthesis into a coherent design recommendation. Useful for ADR authoring and architecture writs."
mode = "manifest"

[variables]
target = { description = "Writ ID of the design target", required = true }

[[steps]]
id = "api-design"
title = "API Design Exploration"
kind = "analysis"
instructions = "steps/api-design.md"

[[steps]]
id = "data-model"
title = "Data Model Exploration"
kind = "analysis"
instructions = "steps/data-model.md"

[[steps]]
id = "ux-interaction"
title = "UX / Interaction Exploration"
kind = "analysis"
instructions = "steps/ux-interaction.md"

[[steps]]
id = "scalability"
title = "Scalability Exploration"
kind = "analysis"
instructions = "steps/scalability.md"

[[steps]]
id = "security"
title = "Security Exploration"
kind = "analysis"
instructions = "steps/security.md"

[[steps]]
id = "integration"
title = "Integration Surface Exploration"
kind = "analysis"
instructions = "steps/integration.md"

[[steps]]
id = "synthesis"
title = "Design Synthesis"
kind = "analysis"
instructions = "steps/synthesis.md"
needs = ["api-design", "data-model", "ux-interaction", "scalability", "security", "integration"]

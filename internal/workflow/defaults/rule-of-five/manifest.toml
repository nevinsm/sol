name = "rule-of-five"
description = "Five-pass iterative refinement: draft, then four focused revision passes."
mode = "manifest"

[[steps]]
id = "draft"
title = "Draft: {{target.title}}"
description = "Initial attempt at {{target.title}}. Breadth over depth — get a working solution down."

[[steps]]
id = "refine-correctness"
title = "Refine 1 — Correctness: {{target.title}}"
description = "Fix errors, bugs, and logical mistakes in the draft."
needs = ["draft"]

[[steps]]
id = "refine-clarity"
title = "Refine 2 — Clarity: {{target.title}}"
description = "Improve readability, naming, and structure. Make the code obvious."
needs = ["refine-correctness"]

[[steps]]
id = "refine-edge-cases"
title = "Refine 3 — Edge Cases: {{target.title}}"
description = "Handle boundary conditions, error paths, and unusual inputs."
needs = ["refine-clarity"]

[[steps]]
id = "refine-polish"
title = "Refine 4 — Polish: {{target.title}}"
description = "Final pass. Tests, documentation, commit hygiene."
needs = ["refine-edge-cases"]

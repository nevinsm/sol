name = "rule-of-five"
description = "Five-pass iterative refinement: draft, then four focused revision passes. Each pass gets a fresh agent session with branch continuity."
mode = "manifest"

[variables]
target = { description = "Target writ providing title/description for step substitution", required = false }

[[steps]]
id = "draft"
title = "Draft: {{target.title}}"
kind = "code"
instructions = "steps/draft.md"

[[steps]]
id = "refine-correctness"
title = "Refine 1 — Correctness: {{target.title}}"
kind = "code"
instructions = "steps/refine-correctness.md"
needs = ["draft"]

[[steps]]
id = "refine-clarity"
title = "Refine 2 — Clarity: {{target.title}}"
kind = "code"
instructions = "steps/refine-clarity.md"
needs = ["refine-correctness"]

[[steps]]
id = "refine-edge-cases"
title = "Refine 3 — Edge Cases: {{target.title}}"
kind = "code"
instructions = "steps/refine-edge-cases.md"
needs = ["refine-clarity"]

[[steps]]
id = "refine-polish"
title = "Refine 4 — Polish: {{target.title}}"
kind = "code"
instructions = "steps/refine-polish.md"
needs = ["refine-edge-cases"]

name = "idea-to-plan"
type = "workflow"
description = "Planning pipeline from concept to writs — takes a vague idea through requirements review, design exploration, and plan review to produce concrete writs."

[variables]
idea = { required = true }
world = { required = true }

[[steps]]
id = "understand-intent"
title = "Understand the intent"
instructions = "steps/01-understand-intent.md"

[[steps]]
id = "review-requirements"
title = "Review requirements"
instructions = "steps/02-review-requirements.md"
needs = ["understand-intent"]

[[steps]]
id = "explore-design"
title = "Explore design options"
instructions = "steps/03-explore-design.md"
needs = ["review-requirements"]

[[steps]]
id = "review-plan"
title = "Review the plan"
instructions = "steps/04-review-plan.md"
needs = ["explore-design"]

[[steps]]
id = "create-writs"
title = "Create writs"
instructions = "steps/05-create-writs.md"
needs = ["review-plan"]

[[steps]]
id = "summarize"
title = "Summarize"
instructions = "steps/06-summarize.md"
needs = ["create-writs"]

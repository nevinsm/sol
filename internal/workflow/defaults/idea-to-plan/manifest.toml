name = "idea-to-plan"
type = "workflow"
description = "Planning pipeline from concept to work items — takes a vague idea through requirements review, design exploration, and plan review to produce concrete work items."

[variables]
idea = { required = true }
world = { required = true }

[[steps]]
id = "understand-intent"
title = "Understand the intent"
instructions = "steps/01-understand-intent.md"

[[steps]]
id = "review-requirements"
title = "Review requirements"
instructions = "steps/02-review-requirements.md"
needs = ["understand-intent"]

[[steps]]
id = "explore-design"
title = "Explore design options"
instructions = "steps/03-explore-design.md"
needs = ["review-requirements"]

[[steps]]
id = "review-plan"
title = "Review the plan"
instructions = "steps/04-review-plan.md"
needs = ["explore-design"]

[[steps]]
id = "create-work-items"
title = "Create work items"
instructions = "steps/05-create-work-items.md"
needs = ["review-plan"]

[[steps]]
id = "summarize"
title = "Summarize"
instructions = "steps/06-summarize.md"
needs = ["create-work-items"]

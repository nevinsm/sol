kind = "analysis"
instructions = "steps/orchestration.md"
focus = "internal/workflow/, internal/worldexport/, internal/worldsync/, internal/status/, internal/dash/, internal/style/, internal/sitrep/, internal/docgen/"

[[legs]]
id = "integration-tests"
title = "Review integration tests"
kind = "analysis"
instructions = "steps/integration-tests.md"
focus = "test/integration/"

[[legs]]
id = "documentation"
title = "Review documentation"
kind = "analysis"

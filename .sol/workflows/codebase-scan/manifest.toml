name = "codebase-scan"
mode = "manifest"
description = "Comprehensive codebase review — parallel analysis across all code, tests, documentation, and configuration, then batch verification, adversarial triage, cross-domain review, and commission into a fix caravan."

[variables]
prior_caravan = { required = false, default = "", description = "Caravan ID from a prior scan run. When provided, the commission step cross-references to avoid re-creating writs for already-fixed issues." }

# --- Analysis steps (phase 0 — all parallel, no dependencies) ---

# internal/store/
[[steps]]
id = "store"
title = "Review store layer"
kind = "analysis"
instructions = "steps/store.md"

# internal/config/, setup/, fileutil/, processutil/, logutil/, envfile/, namepool/
[[steps]]
id = "config-and-setup"
title = "Review config, setup, and utilities"
kind = "analysis"
instructions = "steps/config-and-setup.md"

# internal/startup/, dispatch/, session/, tether/, adapter/, handoff/, budget/, guidelines/
[[steps]]
id = "session-lifecycle"
title = "Review session lifecycle"
kind = "analysis"
instructions = "steps/session-lifecycle.md"

# internal/envoy/
[[steps]]
id = "agent-roles"
title = "Review agent roles"
kind = "analysis"
instructions = "steps/agent-roles.md"

# internal/protocol/, persona/
[[steps]]
id = "protocol-and-skills"
title = "Review protocol layer and skills"
kind = "analysis"
instructions = "steps/protocol-and-skills.md"

# internal/forge/
[[steps]]
id = "forge"
title = "Review forge"
kind = "analysis"
instructions = "steps/forge.md"

# internal/sentinel/, consul/, prefect/, service/, heartbeat/
[[steps]]
id = "supervision"
title = "Review supervision layer"
kind = "analysis"
instructions = "steps/supervision.md"

# internal/broker/, nudge/, inbox/, escalation/
[[steps]]
id = "messaging"
title = "Review messaging systems"
kind = "analysis"
instructions = "steps/messaging.md"

# internal/ledger/, chronicle/, events/, trace/
[[steps]]
id = "observability"
title = "Review observability systems"
kind = "analysis"
instructions = "steps/observability.md"

# internal/quota/, doctor/, account/, git/
[[steps]]
id = "operational"
title = "Review operational utilities"
kind = "analysis"
instructions = "steps/operational.md"

# cmd/
[[steps]]
id = "cli"
title = "Review CLI commands"
kind = "analysis"
instructions = "steps/cli.md"

# internal/workflow/, worldexport/, worldsync/, status/, dash/, style/, docgen/
[[steps]]
id = "orchestration"
title = "Review orchestration and presentation"
kind = "analysis"
instructions = "steps/orchestration.md"

# test/integration/
[[steps]]
id = "integration-tests"
title = "Review integration tests"
kind = "analysis"
instructions = "steps/integration-tests.md"

# docs/
[[steps]]
id = "documentation"
title = "Review documentation"
kind = "analysis"
instructions = "steps/documentation.md"

# Makefile, go.mod, embedded workflows, skills, prompts, defaults
[[steps]]
id = "build-and-agent-env"
title = "Review build system and agent environment"
kind = "analysis"
instructions = "steps/build-and-agent-env.md"

# --- Verification pipeline (phase 1 — parallel batch verification) ---

[[steps]]
id = "batch-verify-1"
title = "Verify findings: data layer, config, and dispatch"
kind = "analysis"
instructions = "steps/batch-verify-1.md"
needs = ["store", "config-and-setup", "session-lifecycle"]

[[steps]]
id = "batch-verify-2"
title = "Verify findings: agent infrastructure and merge pipeline"
kind = "analysis"
instructions = "steps/batch-verify-2.md"
needs = ["agent-roles", "protocol-and-skills", "forge"]

[[steps]]
id = "batch-verify-3"
title = "Verify findings: monitoring, messaging, and telemetry"
kind = "analysis"
instructions = "steps/batch-verify-3.md"
needs = ["supervision", "messaging", "observability"]

[[steps]]
id = "batch-verify-4"
title = "Verify findings: CLI, quota, workflow, and status"
kind = "analysis"
instructions = "steps/batch-verify-4.md"
needs = ["operational", "cli", "orchestration"]

[[steps]]
id = "batch-verify-5"
title = "Verify findings: tests, docs, and build system"
kind = "analysis"
instructions = "steps/batch-verify-5.md"
needs = ["integration-tests", "documentation", "build-and-agent-env"]

# --- Adversarial triage (phase 2) ---

[[steps]]
id = "adversarial-triage"
title = "Adversarial triage"
kind = "analysis"
instructions = "steps/adversarial-triage.md"
needs = ["batch-verify-1", "batch-verify-2", "batch-verify-3", "batch-verify-4", "batch-verify-5"]

# --- Synthesis pipeline (phases 3-4, sequential) ---

[[steps]]
id = "cross-domain"
title = "Cross-domain review"
kind = "analysis"
instructions = "steps/cross-domain.md"
needs = ["adversarial-triage"]

[[steps]]
id = "commission"
title = "Commission fix caravan"
kind = "analysis"
instructions = "steps/commission.md"
needs = ["cross-domain"]

[[legs]]
id = "agent-roles"
title = "Review agent roles"
kind = "analysis"
instructions = "steps/agent-roles.md"
focus = "internal/envoy/, internal/governor/, internal/chancellor/, internal/brief/, internal/skills/"

[[legs]]
id = "services"
title = "Review service components"
kind = "analysis"
instructions = "steps/services.md"
focus = "internal/forge/, internal/sentinel/, internal/consul/, internal/prefect/, internal/service/, internal/heartbeat/"

[[legs]]
id = "protocol"
title = "Review protocol layer"
kind = "analysis"
instructions = "steps/protocol.md"
focus = "internal/protocol/"

[[legs]]
id = "support-systems"
title = "Review support systems"
kind = "analysis"
instructions = "steps/support-systems.md"
focus = "internal/ledger/, internal/broker/, internal/nudge/, internal/chronicle/, internal/events/, internal/quota/, internal/doctor/, internal/escalation/, internal/inbox/, internal/account/, internal/trace/"

[[legs]]
id = "cli"

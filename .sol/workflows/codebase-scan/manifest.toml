name = "codebase-scan"
type = "convoy"
description = "Comprehensive codebase review — parallel analysis across all code, tests, documentation, and configuration, then synthesize findings into a fix caravan in drydock."

[[legs]]
id = "core-infra"
title = "Review core infrastructure"
kind = "analysis"
instructions = "steps/core-infra.md"
focus = "internal/store/, internal/config/, internal/setup/, internal/fileutil/, internal/processutil/, internal/logutil/, internal/envfile/, internal/git/, internal/namepool/"

[[legs]]
id = "session-lifecycle"
title = "Review session lifecycle"
kind = "analysis"
instructions = "steps/session-lifecycle.md"

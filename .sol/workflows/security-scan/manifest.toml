name = "security-scan"
mode = "manifest"
description = "Static security analysis — parallel SAST (gosec), dependency vulnerability scanning (govulncheck), and secrets detection, then triage against baseline and commission into a fix caravan."

[variables]
prior_caravan = { required = false, default = "", description = "Caravan ID from a prior security scan. When provided, the commission step cross-references to avoid re-creating writs for already-fixed issues." }

# --- Tool execution (phase 0 — prerequisite) ---

[[steps]]
id = "gosec-run"
title = "Run gosec and save raw output"
kind = "analysis"
instructions = "steps/gosec-run.md"

# --- Analysis steps (phase 1 — parallel, all depend on gosec-run) ---

[[steps]]
id = "gosec-input-handling"
title = "SAST: injection and file operation risks"
kind = "analysis"
instructions = "steps/gosec-input-handling.md"
needs = ["gosec-run"]

[[steps]]
id = "gosec-code-quality"
title = "SAST: error handling, concurrency, and cryptography"
kind = "analysis"
instructions = "steps/gosec-code-quality.md"
needs = ["gosec-run"]

[[steps]]
id = "secrets-scan"
title = "Secrets detection scan"
kind = "analysis"
instructions = "steps/secrets-scan.md"

[[steps]]
id = "dep-audit"
title = "Dependency vulnerability audit"
kind = "analysis"
instructions = "steps/dep-audit.md"

# --- Synthesis pipeline (phases 2-3, sequential) ---

[[steps]]
id = "triage"
title = "Triage and validate security findings"
kind = "analysis"
instructions = "steps/triage.md"
needs = ["gosec-input-handling", "gosec-code-quality", "secrets-scan", "dep-audit"]

[[steps]]
id = "commission"
title = "Commission security fix caravan"
kind = "analysis"
instructions = "steps/commission.md"
needs = ["triage"]

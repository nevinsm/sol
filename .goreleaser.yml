version: 2

builds:
  - binary: sol
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/nevinsm/sol/cmd.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

brews:
  - repository:
      owner: nevinsm
      name: homebrew-sol
      # Requires a HOMEBREW_TAP_TOKEN secret with repo access to nevinsm/homebrew-sol
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/nevinsm/sol"
    description: "Multi-agent orchestration system"
    license: "MIT"
    dependencies:
      - name: tmux
    test: |
      system bin/"sol", "version"

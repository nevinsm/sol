version: 2

builds:
  - binary: sol
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/nevinsm/sol/cmd.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

homebrew_casks:
  - name: sol
    binaries:
      - sol
    repository:
      owner: nevinsm
      name: homebrew-sol
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/nevinsm/sol"
    description: "Multi-agent orchestration system"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/sol"]
          end
